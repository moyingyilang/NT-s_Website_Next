        <i class="fa-regular fa-clock"></i> 仅显示已公开的公告
    </div>
</div>
<script>
    // 加载公告
    async function loadAnnouncements() {
        const res = await fetch('/api/public/announcements');
        const data = await res.json();
        const container = document.getElementById('announcement-list');
        if (!data.success || data.data.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fa-regular fa-message" style="font-size: 3rem; opacity: 0.4; margin-bottom: 1rem;"></i>
                    <p>暂无公开公告，请稍后访问。</p>
                </div>
            `;
            return;
        }
        let html = '';
        data.data.forEach(ann => {
            html += `
                <div class="card">
                    <div class="card-title">${ann.title}</div>
                    <div class="card-summary">${ann.summary}</div>
                    <div class="meta-row">
                        <span class="date"><i class="fa-regular fa-calendar"></i> ${ann.date}</span>
                        <div class="tag-group">
                            ${ann.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    loadAnnouncements();
</script>
