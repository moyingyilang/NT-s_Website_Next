<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTC - 压缩包分块上传</title>
    <!-- 第三方CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <!-- 本地样式 -->
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dark-mode.css">
    <style>
        /* 页面专属小样式，避免污染全局 */
        .file-input-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0 10px;
            height: 40px;
            display: flex;
            align-items: center;
            background: var(--input-bg);
            color: var(--text-color);
        }
        #fileInput {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>
<body class="dark-mode">
    <div class="page-container">
        <!-- 页面头部 -->
        <div class="page-header">
            <button class="back-btn" onclick="window.location.href='/'" title="返回首页">
                <i class="fa fa-arrow-left"></i>
            </button>
            <span>压缩包分块上传</span>
        </div>

        <!-- 页面核心内容 -->
        <div class="page-content">
            <!-- 上传区域卡片 -->
            <div class="card">
                <div class="card-title">文件上传</div>
                <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
                    <div class="file-input-wrap">
                        <span id="fileTip">请选择压缩包文件（最大500MB）</span>
                        <input type="file" id="fileInput" accept=".zip,.rar,.7z,.tar,.gz,.bz2,.xz,.tgz">
                    </div>
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">选择文件</button>
                </div>

                <!-- 上传进度条（默认隐藏） -->
                <div id="uploadProgress" class="hidden" style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px;">
                        <span id="progressText">0% (0/0 块)</span>
                        <span id="speedText">上传速度：0 MB/s</span>
                    </div>
                    <div style="width: 100%; height: 6px; background: var(--border-color); border-radius: 3px; overflow: hidden;">
                        <div id="progressBar" style="width: 0%; height: 100%; background: #07c160; transition: width 0.3s ease;"></div>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div>
                    <button class="btn btn-primary" id="startUploadBtn" onclick="startUpload()" disabled>开始上传</button>
                    <button class="btn btn-default" id="pauseUploadBtn" onclick="pauseUpload()" disabled style="margin-left: 10px;">暂停上传</button>
                    <button class="btn btn-default" onclick="resetUploadState()" style="margin-left: 10px;">重置</button>
                </div>
            </div>

            <!-- 我的上传文件列表 -->
            <div class="card" style="margin-top: 20px;">
                <div class="card-title">我的上传文件</div>
                <div id="fileList" style="min-height: 100px;">
                    <div style="text-align: center; color: #999; padding: 20px 0;">加载文件列表中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 本地JS -->
    <script src="/js/common.js"></script>
    <script src="/upF/upF.js"></script>
    <script>
        // 页面加载完成后校验登录状态
        window.onload = async function() {
            const isLoggedIn = await checkLoginStatus();
            if (!isLoggedIn) {
                window.location.href = '/';
                return;
            }
            // 加载用户文件列表
            loadMyFiles();
            // 绑定文件选择事件
            document.getElementById('fileInput').addEventListener('change', fileSelectCallback);
        };
    </script>
</body>
</html>
