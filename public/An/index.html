<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NTC - 系统公告</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dark-mode.css">
</head>
<body class="dark-mode">
    <div class="page-container">
        <!-- 页面头部 -->
        <div class="page-header">
            <button class="back-btn" onclick="window.location.href='/'" title="返回首页">
                <i class="fa fa-arrow-left"></i>
            </button>
            <span>系统公告</span>
        </div>
        <!-- 页面内容 -->
        <div class="page-content">
            <!-- 公告详情弹层 -->
            <div class="modal" id="annDetailModal">
                <div class="modal-content" style="max-width: 700px;">
                    <span class="close" onclick="closeModal('annDetailModal')">&times;</span>
                    <h3 id="detailTitle"></h3>
                    <div style="margin: 15px 0; color: #999; font-size: 14px;" id="detailDate"></div>
                    <div style="padding: 10px 0; border-top: 1px solid var(--border-color);" id="detailContent"></div>
                    <div style="margin-top: 20px; display: flex; flex-wrap: wrap; gap: 8px;" id="detailTags"></div>
                </div>
            </div>

            <!-- 公告列表 -->
            <div class="card">
                <div class="card-title">公告列表</div>
                <div id="annList" style="min-height: 300px;">
                    <div style="text-align: center; color: #999; padding: 50px 0;">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/An/an.js"></script>
    <script>
        window.onload = async function() {
            // 校验登录状态
            const isLoggedIn = await checkLoginStatus();
            if (!isLoggedIn) {
                window.location.href = '/';
            } else {
                loadAnnList(); // 加载公告列表
            }
        }
    </script>
</body>
</html>
